<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="EsIzLpJmwqEDK1f1RyPkE1-iBMVmVPRehIUXzpgtkrY" />
    <title>AiPassportStudio Pro - Global Standards Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide-static/0.321.0/lucide.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // --- CONFIGURATION ---
        // Sani, apni API Key niche daalein
        const apiKey = "AIzaSyCtrBRIys4gly3fdUhrE3QVSYku1C8JoQA"; 
        const TEXT_MODEL = "gemini-1.5-flash"; 
        const IMAGE_MODEL = "gemini-1.5-flash";

        const REGIONS = {
            INDIA: { name: 'India', sizes: [
                { id: 'in_pass', name: 'Passport (35x45mm)', w: 413, h: 531, label: 'Standard' },
                { id: 'in_visa', name: 'Visa (51x51mm)', w: 600, h: 600, label: '2x2 inch' },
                { id: 'in_pan', name: 'PAN Card', w: 295, h: 413, label: 'Small' }
            ]},
            USA: { name: 'USA', sizes: [ { id: 'us_visa', name: 'Visa / Passport', w: 600, h: 600, label: '2x2 inch' } ]},
            EUROPE: { name: 'EU / UK', sizes: [ { id: 'eu_std', name: 'Standard (35x45mm)', w: 413, h: 531, label: 'UK / EU' } ]},
            GLOBAL: { name: 'Global', sizes: [ { id: 'glb_std', name: 'Standard (2x2)', w: 600, h: 600, label: 'Global' } ]}
        };

        const MALE_CLOTHING = [
            { id: 'm-suit-blk', label: 'Black Suit', prompt: 'professional black business suit, white shirt, dark tie' },
            { id: 'm-suit-nvy', label: 'Navy Suit', prompt: 'navy blue formal suit, white shirt, silk tie' },
            { id: 'm-shirt-wht', label: 'White Shirt', prompt: 'crisp white formal button-down shirt' }
        ];

        const FEMALE_CLOTHING = [
            { id: 'f-saree-red', label: 'Red Saree', prompt: 'professional traditional red Indian saree with golden border' },
            { id: 'f-saree-blu', label: 'Blue Saree', prompt: 'formal blue Indian saree for official photo' },
            { id: 'f-blazer-blk', label: 'Black Blazer', prompt: 'women\'s professional black formal blazer, white top' }
        ];

        const BACKGROUNDS = [
            { name: 'White', color: '#FFFFFF' },
            { name: 'Off-White', color: '#F8F8F8' },
            { name: 'Light Blue', color: '#E3F2FD' },
            { name: 'Royal Blue', color: '#003399' },
            { name: 'Grey', color: '#E5E7EB' }
        ];

        const PAGE_SIZES = [
            { id: '4x6', name: '4x6 Photo Paper', w: 1200, h: 1800 },
            { id: 'A4', name: 'A4 Sheet', w: 2480, h: 3508 }
        ];

        function App() {
            const [step, setStep] = useState(1);
            const [originalImage, setOriginalImage] = useState(null);
            const [processedImage, setProcessedImage] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [auditResult, setAuditResult] = useState(null);
            const [aiAdvice, setAiAdvice] = useState("");
            const [selectedRegion, setSelectedRegion] = useState('INDIA');
            const [selectedSize, setSelectedSize] = useState(REGIONS.INDIA.sizes[0]);
            const [bgColor, setBgColor] = useState(BACKGROUNDS[0].color);
            const [gridCount, setGridCount] = useState(1);
            const [paperSize, setPaperSize] = useState(PAGE_SIZES[0]);
            const [brightness, setBrightness] = useState(100);
            const [contrast, setContrast] = useState(100);
            const [saturation, setSaturation] = useState(100);

            const fileInputRef = useRef(null);
            const canvasRef = useRef(null);

            const fetchWithRetry = async (url, options, retries = 3) => {
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (response.ok) return await response.json();
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(res => setTimeout(res, 1000 * (i + 1)));
                    }
                }
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        setOriginalImage(f.target.result);
                        setProcessedImage(f.target.result);
                        setStep(2);
                        runAiAudit(f.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const runAiAudit = async (img) => {
                setIsProcessing(true);
                const base64 = img.split(',')[1];
                try {
                    const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Audit passport photo compliance. Return JSON: {centered:bool, expression:bool, eyes:bool, lighting:bool, score:int, feedback:string}" }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    setAuditResult(JSON.parse(data.candidates[0].content.parts[0].text));
                } catch (err) { console.error(err); }
                setIsProcessing(false);
            };

            const callAiImage = async (prompt) => {
                setIsProcessing(true);
                const base64 = processedImage.split(',')[1];
                try {
                    const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${IMAGE_MODEL}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                            generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                        })
                    });
                    const newImg = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    if (newImg) setProcessedImage(`data:image/png;base64,${newImg}`);
                } catch (err) { alert("AI error, please check connection."); }
                setIsProcessing(false);
            };

            const renderCanvas = useCallback(() => {
                if (!processedImage || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.src = processedImage;
                img.onload = () => {
                    const { w, h } = selectedSize;
                    if (gridCount === 1) {
                        canvas.width = w; canvas.height = h;
                        ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
                        ctx.drawImage(img, 0, 0, w, h);
                    } else {
                        canvas.width = paperSize.w; canvas.height = paperSize.h;
                        ctx.fillStyle = 'white'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
                        const margin = 80; const gap = 30;
                        const cols = Math.floor((paperSize.w - margin * 2) / (w + gap));
                        for (let i = 0; i < gridCount; i++) {
                            const col = i % cols; const row = Math.floor(i / cols);
                            const x = margin + col * (w + gap); const y = margin + row * (h + gap);
                            if (y + h > paperSize.h - margin) break;
                            ctx.drawImage(img, x, y, w, h);
                            ctx.strokeStyle = '#eee'; ctx.strokeRect(x, y, w, h);
                        }
                    }
                };
            }, [processedImage, selectedSize, gridCount, paperSize, brightness, contrast, saturation]);

            useEffect(() => { renderCanvas(); }, [renderCanvas]);

            return (
                <div className="min-h-screen pb-20">
                    <header className="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-xl border-b px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white"><lucide-icon name="sparkles" /></div>
                            <h1 className="text-lg font-black tracking-tighter text-indigo-600">AiPassportStudio Pro</h1>
                        </div>
                    </header>

                    <main className="pt-28 max-w-7xl mx-auto px-6">
                        {step === 1 && (
                            <div className="text-center space-y-12 py-12 animate-in">
                                <h2 className="text-5xl font-black text-slate-900 leading-tight">Create Perfect <span className="text-indigo-600">AI Passport</span> Photos</h2>
                                <div onClick={() => fileInputRef.current?.click()} className="bg-white border-2 border-dashed border-slate-200 rounded-[40px] p-20 hover:border-indigo-400 cursor-pointer shadow-sm group">
                                    <div className="bg-indigo-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto text-white mb-4"><i data-lucide="upload"></i></div>
                                    <h3 className="text-2xl font-black">Upload Portrait</h3>
                                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" accept="image/*" />
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="flex flex-col lg:flex-row gap-8 animate-in">
                                <div className="w-full lg:w-1/3 bg-white p-8 rounded-[40px] border shadow-sm space-y-8">
                                    <h2 className="text-xl font-black">Select Country</h2>
                                    <div className="grid grid-cols-2 gap-2">
                                        {Object.keys(REGIONS).map(r => (
                                            <button key={r} onClick={() => { setSelectedRegion(r); setSelectedSize(REGIONS[r].sizes[0]); }} className={`py-3 rounded-2xl text-xs font-black border ${selectedRegion === r ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-400'}`}>{REGIONS[r].name}</button>
                                        ))}
                                    </div>
                                    <div className="space-y-2">
                                        {REGIONS[selectedRegion].sizes.map(sz => (
                                            <button key={sz.id} onClick={() => setSelectedSize(sz)} className={`w-full p-4 rounded-2xl border text-left flex justify-between ${selectedSize.id === sz.id ? 'bg-indigo-50 border-indigo-200' : 'bg-white'}`}>
                                                <div><p className="text-xs font-black">{sz.name}</p><p className="text-[10px] text-slate-400 uppercase tracking-widest">{sz.label}</p></div>
                                                {selectedSize.id === sz.id && <i data-lucide="check-circle" className="text-indigo-600"></i>}
                                            </button>
                                        ))}
                                    </div>
                                    <button onClick={() => setStep(3)} className="w-full bg-indigo-600 text-white py-5 rounded-[28px] font-black">Next: AI Editing</button>
                                </div>
                                <div className="flex-1 flex flex-col items-center">
                                    <img src={originalImage} className="max-w-full max-h-[60vh] rounded-2xl shadow-2xl" />
                                    {isProcessing && <p className="mt-4 font-bold animate-pulse text-indigo-600">AI Auditing...</p>}
                                    {auditResult && <p className="mt-4 text-sm bg-green-50 text-green-700 p-3 rounded-xl border border-green-100">{auditResult.feedback}</p>}
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="flex flex-col lg:flex-row gap-8 animate-in">
                                <div className="w-full lg:w-1/3 bg-slate-900 p-8 rounded-[40px] text-white space-y-8 shadow-2xl">
                                    <h3 className="text-xs font-black uppercase text-slate-500 tracking-widest">AI Tools</h3>
                                    <div className="grid grid-cols-3 gap-2">
                                        {BACKGROUNDS.map(bg => (
                                            <button key={bg.name} onClick={() => setBgColor(bg.color)} className={`h-10 rounded-xl border-2 ${bgColor === bg.color ? 'border-indigo-500' : 'border-transparent'}`} style={{ backgroundColor: bg.color }} />
                                        ))}
                                    </div>
                                    <button onClick={() => callAiImage(`Remove background and replace with solid ${bgColor}`)} className="w-full bg-indigo-600 py-4 rounded-2xl font-black text-xs">Remove Background</button>
                                    
                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black uppercase text-slate-500">Dual Wardrobe</p>
                                        <div className="grid grid-cols-2 gap-2">
                                            {MALE_CLOTHING.concat(FEMALE_CLOTHING).map(p => (
                                                <button key={p.id} onClick={() => callAiImage(`Change clothes to ${p.prompt}. Keep face same.`)} className="p-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold hover:bg-white/10 transition-all">{p.label}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => setStep(4)} className="w-full bg-white text-slate-900 py-5 rounded-3xl font-black">Next: Layout</button>
                                </div>
                                <div className="flex-1 flex flex-col items-center">
                                    <canvas ref={canvasRef} className="max-w-full max-h-[70vh] shadow-2xl bg-white"></canvas>
                                    {isProcessing && <p className="mt-4 font-bold animate-pulse text-indigo-600 uppercase tracking-widest">AI Processing...</p>}
                                    <div className="w-full bg-white p-6 rounded-3xl mt-6 border flex gap-6">
                                        <div className="flex-1 space-y-2"><p className="text-[10px] font-black uppercase text-slate-400">Brightness: {brightness}%</p><input type="range" min="70" max="130" value={brightness} onChange={(e) => setBrightness(e.target.value)} className="w-full" /></div>
                                        <div className="flex-1 space-y-2"><p className="text-[10px] font-black uppercase text-slate-400">Contrast: {contrast}%</p><input type="range" min="70" max="130" value={contrast} onChange={(e) => setContrast(e.target.value)} className="w-full" /></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 4 && (
                            <div className="flex flex-col lg:flex-row gap-8 animate-in">
                                <div className="w-full lg:w-1/3 bg-white p-8 rounded-[40px] border shadow-sm space-y-8">
                                    <h2 className="text-xl font-black">Final Layout</h2>
                                    <div className="grid grid-cols-1 gap-2">
                                        {PAGE_SIZES.map(p => (
                                            <button key={p.id} onClick={() => setPaperSize(p)} className={`p-4 rounded-2xl text-xs font-black border ${paperSize.id === p.id ? 'bg-slate-900 text-white' : 'bg-slate-50'}`}>{p.name}</button>
                                        ))}
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        {[1, 4, 8, 12, 16, 24].map(n => (
                                            <button key={n} onClick={() => setGridCount(n)} className={`w-12 h-12 rounded-xl text-xs font-black ${gridCount === n ? 'bg-indigo-600 text-white' : 'bg-slate-50'}`}>{n}</button>
                                        ))}
                                    </div>
                                    <button onClick={() => { const link = document.createElement('a'); link.download = 'passport.png'; link.href = canvasRef.current.toDataURL('image/png', 1.0); link.click(); }} className="w-full bg-indigo-600 text-white py-6 rounded-3xl font-black flex items-center justify-center gap-3"><i data-lucide="download"></i> Download HD Photo</button>
                                    <button onClick={() => setStep(3)} className="w-full text-[10px] font-black uppercase text-slate-400 hover:text-indigo-600">Back to Edit</button>
                                </div>
                                <div className="flex-1 flex justify-center bg-slate-200 p-8 rounded-[40px] overflow-auto min-h-[500px]">
                                    <canvas ref={canvasRef} className="shadow-2xl bg-white origin-top"></canvas>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-20 border-t py-12 px-6 text-center text-[10px] font-black uppercase tracking-widest text-slate-300">
                        <p>© 2026 AiPassportStudio Pro - Global Standards Edition</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        setTimeout(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
