<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiPassportStudio - Professional AI Passport Photo Maker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide-static/0.321.0/lucide.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .studio-card { background: white; border-radius: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .gradient-text { background: linear-gradient(90deg, #4f46e5, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #4f46e5, #3730a3); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // 🔑 API KEY INTEGRATED
        const apiKey = "AQ.Ab8RN6LGvBeTwo79CRPHDI_NL2m0Lia3EkcIm0GQoMIkVmHDNA";

        const PASSPORT_SIZES = [
            { name: 'India Passport (35x45mm)', width: 413, height: 531 },
            { name: 'India Visa (2x2 inch)', width: 600, height: 600 },
            { name: 'PAN Card (25x35mm)', width: 295, height: 413 },
            { name: 'US Visa (51x51mm)', width: 600, height: 600 }
        ];

        const CLOTHING = [
            { id: 'suit-black', label: 'Men Black Suit', prompt: 'wearing a professional black formal suit with white shirt and tie' },
            { id: 'suit-blue', label: 'Men Navy Suit', prompt: 'wearing a navy blue formal business suit' },
            { id: 'sari-red', label: 'Female Red Saree', prompt: 'wearing a professional formal red Indian saree' },
            { id: 'blazer-female', label: 'Female Blazer', prompt: 'wearing a professional women\'s black formal blazer' }
        ];

        function App() {
            const [image, setImage] = useState(null);
            const [processedImage, setProcessedImage] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [gridCount, setGridCount] = useState(1);
            const [paperSize, setPaperSize] = useState('4x6');
            const [brightness, setBrightness] = useState(100);
            const [contrast, setContrast] = useState(100);
            
            const fileInputRef = useRef(null);
            const canvasRef = useRef(null);

            const handleUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        setImage(f.target.result);
                        setProcessedImage(f.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const callAI = async (prompt) => {
                setIsProcessing(true);
                try {
                    const base64 = processedImage.split(',')[1];
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64 } }] }]
                        })
                    });
                    const result = await response.json();
                    const newImg = result.candidates[0].content.parts.find(p => p.inlineData)?.inlineData?.data;
                    if (newImg) setProcessedImage(`data:image/png;base64,${newImg}`);
                } catch (e) { alert("AI processing error. Check API Key limits."); }
                setIsProcessing(false);
            };

            useEffect(() => {
                if (processedImage && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    img.onload = () => {
                        const size = PASSPORT_SIZES[0];
                        if (gridCount === 1) {
                            canvas.width = size.width;
                            canvas.height = size.height;
                            ctx.filter = `brightness(${brightness}%) contrast(${contrast}%)`;
                            ctx.drawImage(img, 0, 0, size.width, size.height);
                        } else {
                            // A4 or 4x6 logic
                            canvas.width = paperSize === '4x6' ? 1200 : 2480;
                            canvas.height = paperSize === '4x6' ? 1800 : 3508;
                            ctx.fillStyle = 'white';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                            ctx.filter = `brightness(${brightness}%) contrast(${contrast}%)`;
                            for (let i = 0; i < gridCount; i++) {
                                const col = i % (paperSize === '4x6' ? 3 : 5);
                                const row = Math.floor(i / (paperSize === '4x6' ? 3 : 5));
                                ctx.drawImage(img, 100 + col * 350, 100 + row * 500, 300, 400);
                            }
                        }
                    };
                    img.src = processedImage;
                }
            }, [processedImage, gridCount, paperSize, brightness, contrast]);

            return (
                <div className="min-h-screen flex flex-col pb-20">
                    <header className="bg-white/80 backdrop-blur-md border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white"><i data-lucide="sparkles"></i></div>
                            <h1 className="text-xl font-black gradient-text">AiPassportStudio</h1>
                        </div>
                        {image && (
                            <button onClick={() => {
                                const link = document.createElement('a');
                                link.download = 'studio-photo.png';
                                link.href = canvasRef.current.toDataURL();
                                link.click();
                            }} className="btn-primary text-white px-6 py-2 rounded-full font-bold text-sm">Download Print Ready</button>
                        )}
                    </header>

                    <main className="flex-1 max-w-6xl mx-auto w-full p-6 space-y-12">
                        {!image ? (
                            <section className="text-center space-y-8 py-12">
                                <div className="space-y-4">
                                    <h2 className="text-5xl font-black text-slate-900 leading-tight">Create Professional <br/><span className="gradient-text">Passport Photos</span> in Seconds</h2>
                                    <p className="text-slate-500 text-lg max-w-2xl mx-auto">AI-powered background removal, formal dress changer, and auto-alignment for Indian & International standards.</p>
                                </div>

                                <div onClick={() => fileInputRef.current.click()} className="max-w-xl mx-auto studio-card p-12 border-2 border-dashed border-indigo-200 cursor-pointer hover:bg-indigo-50 transition-all group">
                                    <div className="bg-indigo-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                                        <i data-lucide="upload" className="text-indigo-600 w-8 h-8"></i>
                                    </div>
                                    <p className="font-bold text-slate-700">Click to Upload Portrait</p>
                                    <p className="text-xs text-slate-400 mt-2">JPG, PNG supported • Max 10MB</p>
                                </div>
                                <input type="file" ref={fileInputRef} onChange={handleUpload} className="hidden" />

                                {/* Step by Step Section */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 pt-12">
                                    {[
                                        { title: "1. Upload", desc: "Select any clear face photo from your gallery." },
                                        { title: "2. AI Magic", desc: "Change clothes to suits/sarees and clean background." },
                                        { title: "3. Print", desc: "Select sheet size (A4/4x6) and download instantly." }
                                    ].map(s => (
                                        <div key={s.title} className="p-6 studio-card text-left">
                                            <h4 className="font-black text-indigo-600 mb-2">{s.title}</h4>
                                            <p className="text-sm text-slate-500 font-medium">{s.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        ) : (
                            <div className="flex flex-col lg:flex-row gap-8 animate-in fade-in duration-500">
                                {/* Sidebar Controls */}
                                <div className="w-full lg:w-80 space-y-6">
                                    <div className="bg-slate-900 text-white p-6 rounded-[32px] shadow-xl">
                                        <h3 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">AI Magic Tools</h3>
                                        <button onClick={() => callAI("Remove background and make it plain white")} className="w-full bg-indigo-600 py-3 rounded-2xl font-bold mb-3 flex items-center justify-center gap-2 hover:bg-indigo-500">
                                            <i data-lucide="maximize" className="w-4"></i> Remove Background
                                        </button>
                                        <div className="grid grid-cols-2 gap-2 mt-4">
                                            {CLOTHING.map(c => (
                                                <button key={c.id} onClick={() => callAI(c.prompt)} className="p-2 bg-slate-800 rounded-xl text-[10px] font-bold hover:bg-slate-700">{c.label}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="studio-card p-6">
                                        <h3 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">Print Options</h3>
                                        <select onChange={(e) => setPaperSize(e.target.value)} className="w-full p-3 bg-slate-50 border rounded-xl text-sm font-bold mb-4 outline-none">
                                            <option value="4x6">4x6 Photo Paper</option>
                                            <option value="A4">A4 Standard Sheet</option>
                                        </select>
                                        <div className="flex gap-2">
                                            {[1, 4, 8, 12, 16].map(n => (
                                                <button key={n} onClick={() => setGridCount(n)} className={`w-10 h-10 rounded-xl font-bold text-xs ${gridCount === n ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-500'}`}>{n}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="studio-card p-6">
                                        <h3 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">Manual Adjust</h3>
                                        <div className="space-y-4">
                                            <div>
                                                <div className="flex justify-between text-[10px] font-bold mb-1 uppercase"><span>Brightness</span><span>{brightness}%</span></div>
                                                <input type="range" min="50" max="150" value={brightness} onChange={(e) => setBrightness(e.target.value)} className="w-full accent-indigo-600" />
                                            </div>
                                            <button onClick={() => setImage(null)} className="w-full py-3 text-red-500 text-xs font-black uppercase tracking-widest border border-red-100 rounded-2xl hover:bg-red-50 transition-all">Reset Studio</button>
                                        </div>
                                    </div>
                                </div>

                                {/* Preview Canvas */}
                                <div className="flex-1 space-y-4">
                                    <div className="bg-slate-200 rounded-[40px] p-8 min-h-[600px] flex items-center justify-center border-[12px] border-white shadow-inner relative overflow-hidden">
                                        {isProcessing && (
                                            <div className="absolute inset-0 bg-white/80 backdrop-blur-md z-10 flex flex-col items-center justify-center">
                                                <div className="w-16 h-16 border-4 border-indigo-600/20 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                                                <p className="font-black text-indigo-900 animate-pulse uppercase tracking-widest">AI is Processing...</p>
                                            </div>
                                        )}
                                        <canvas ref={canvasRef} className="max-w-full shadow-2xl bg-white rounded-lg"></canvas>
                                    </div>
                                    <div className="p-4 bg-indigo-50 border border-indigo-100 rounded-2xl flex items-center gap-4">
                                        <div className="bg-white p-2 rounded-lg text-indigo-600"><i data-lucide="info" className="w-5"></i></div>
                                        <p className="text-xs text-indigo-800 font-medium">Tip: Use 300 DPI printer settings for high-quality studio results.</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* SEO Benefits Footer */}
                    <footer className="mt-auto border-t py-12 px-6 bg-white">
                        <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-8">
                            <div>
                                <h5 className="font-black text-xs uppercase mb-4 tracking-widest text-slate-400">Features</h5>
                                <ul className="text-sm text-slate-500 space-y-2 font-medium">
                                    <li>Indian Passport 35x45mm</li>
                                    <li>US Visa 2x2 inch</li>
                                    <li>Multi-Sheet (A4/4x6)</li>
                                    <li>Free BG Removal</li>
                                </ul>
                            </div>
                            <div className="md:col-span-2">
                                <h5 className="font-black text-xs uppercase mb-4 tracking-widest text-slate-400">About Studio</h5>
                                <p className="text-sm text-slate-500 font-medium leading-relaxed">AiPassportStudio is the world's most advanced free tool for creating government-compliant passport photos using Gemini AI. Perfect for students, travelers, and professional studios.</p>
                            </div>
                            <div className="text-right">
                                <p className="text-[10px] font-black uppercase text-slate-300 tracking-[0.4em]">AiPassportStudio © 2026</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide Icons
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
