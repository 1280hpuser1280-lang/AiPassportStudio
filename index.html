<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiPassportStudio - Professional AI Passport Photo Maker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide-static/0.321.0/lucide.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .canvas-container { box-shadow: 0 40px 100px rgba(0,0,0,0.1); border-radius: 40px; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
            background: #4f46e5; cursor: pointer; border: 3px solid white;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // Configuration
        const PASSPORT_SIZES = [
            { name: 'India (35x45mm)', width: 413, height: 531 },
            { name: 'India Visa (2x2)', width: 600, height: 600 },
            { name: 'US (2x2 inch)', width: 600, height: 600 },
            { name: 'UK/EU (35x45mm)', width: 413, height: 531 }
        ];

        const BG_COLORS = ['#FFFFFF', '#F8F8F8', '#ADD8E6', '#003399', '#E0E0E0'];
        const CLOTHING = [
            { id: 'suit-black', label: 'Black Suit' },
            { id: 'suit-navy', label: 'Navy Blue' },
            { id: 'white-shirt', label: 'White Shirt' },
            { id: 'sari-formal', label: 'Formal Saree' }
        ];

        function App() {
            const [image, setImage] = useState(null);
            const [processedImage, setProcessedImage] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [isStudioMode, setIsStudioMode] = useState(true);
            const [gridCount, setGridCount] = useState(1);
            const [bgColor, setBgColor] = useState('#FFFFFF');
            
            // Sliders
            const [brightness, setBrightness] = useState(100);
            const [contrast, setContrast] = useState(100);
            const [saturation, setSaturation] = useState(100);

            const fileInputRef = useRef(null);
            const canvasRef = useRef(null);

            const handleUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        setImage(f.target.result);
                        setProcessedImage(f.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            useEffect(() => {
                if (processedImage && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    img.onload = () => {
                        const size = PASSPORT_SIZES[0];
                        if (gridCount === 1) {
                            canvas.width = size.width;
                            canvas.height = size.height;
                            ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
                            ctx.drawImage(img, 0, 0, size.width, size.height);
                        } else {
                            canvas.width = 1200; // 4x6 sheet
                            canvas.height = 1800;
                            ctx.fillStyle = 'white';
                            ctx.fillRect(0, 0, 1200, 1800);
                            ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
                            for (let i = 0; i < gridCount; i++) {
                                const col = i % 3;
                                const row = Math.floor(i / 3);
                                ctx.drawImage(img, 100 + col * 350, 100 + row * 450, 300, 400);
                            }
                        }
                    };
                    img.src = processedImage;
                }
            }, [processedImage, gridCount, brightness, contrast, saturation]);

            const download = () => {
                const link = document.createElement('a');
                link.download = 'AiPassportStudio-Result.png';
                link.href = canvasRef.current.toDataURL();
                link.click();
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-white border-b px-8 py-4 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white">
                                <i data-lucide="camera"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black tracking-tighter">AiPassportStudio</h1>
                                <p className="text-[10px] uppercase font-bold text-indigo-500 tracking-widest">Studio Engine v2.6</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsStudioMode(!isStudioMode)} className="flex items-center gap-2 px-4 py-2 rounded-full border text-xs font-bold uppercase transition-all">
                                {isStudioMode ? <i data-lucide="unlock" className="w-3"></i> : <i data-lucide="lock" className="w-3"></i>}
                                {isStudioMode ? 'Admin Mode' : 'Public Mode'}
                            </button>
                            {image && <button onClick={download} className="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold shadow-lg hover:bg-indigo-700">Download</button>}
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 max-w-7xl mx-auto w-full p-8 flex flex-col lg:flex-row gap-8">
                        {!image ? (
                            <div className="w-full flex flex-col items-center justify-center mt-20">
                                <div onClick={() => fileInputRef.current.click()} className="border-4 border-dashed border-slate-200 bg-white p-24 rounded-[50px] cursor-pointer hover:border-indigo-400 transition-all text-center">
                                    <div className="bg-indigo-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                                        <i data-lucide="upload" className="text-indigo-600 w-10 h-10"></i>
                                    </div>
                                    <h2 className="text-3xl font-black mb-2">Upload Photo</h2>
                                    <p className="text-slate-400">AI will automatically enhance & format</p>
                                </div>
                                <input type="file" ref={fileInputRef} onChange={handleUpload} className="hidden" accept="image/*" />
                                
                                {/* Ad Space Placeholder */}
                                <div className="mt-12 w-full max-w-4xl h-32 bg-slate-100 rounded-2xl flex items-center justify-center border border-dashed border-slate-300">
                                    <p className="text-slate-400 font-bold uppercase tracking-widest text-xs">AdSense Space (Earn Money Here)</p>
                                </div>
                            </div>
                        ) : (
                            <>
                                {/* Sidebar */}
                                <div className="w-full lg:w-80 space-y-6">
                                    <div className="bg-slate-900 text-white p-6 rounded-[32px] shadow-xl">
                                        <h3 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">AI Tools</h3>
                                        <button className="w-full bg-indigo-600 py-3 rounded-2xl font-bold mb-3 flex items-center justify-center gap-2 hover:bg-indigo-500">
                                            <i data-lucide="zap" className="w-4"></i> AI Auto Enhance
                                        </button>
                                        <button className="w-full bg-slate-800 py-3 rounded-2xl font-bold text-xs flex items-center justify-center gap-2">
                                            <i data-lucide="maximize" className="w-4"></i> Clean Background
                                        </button>
                                    </div>

                                    {isStudioMode && (
                                        <div className="bg-white p-6 rounded-[32px] border shadow-sm">
                                            <h3 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-6">Admin Tuning</h3>
                                            <div className="space-y-6">
                                                {['Brightness', 'Contrast', 'Saturation'].map(label => (
                                                    <div key={label}>
                                                        <div className="flex justify-between mb-2">
                                                            <span className="text-[10px] font-bold uppercase">{label}</span>
                                                            <span className="text-[10px] font-mono text-indigo-600">100%</span>
                                                        </div>
                                                        <input type="range" className="w-full accent-indigo-600 h-1 bg-slate-100 rounded-lg cursor-pointer" />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="bg-white p-6 rounded-[32px] border shadow-sm">
                                        <h3 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">Clothes</h3>
                                        <div className="grid grid-cols-2 gap-2">
                                            {CLOTHING.map(c => (
                                                <button key={c.id} className="p-2 border rounded-xl text-[10px] font-bold bg-slate-50 hover:bg-white transition-all uppercase">{c.label}</button>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* Preview Area */}
                                <div className="flex-1 flex flex-col gap-6">
                                    <div className="bg-white p-4 rounded-3xl border flex items-center justify-between">
                                        <div className="flex gap-2">
                                            {[1, 4, 8].map(num => (
                                                <button key={num} onClick={() => setGridCount(num)} className={`w-10 h-10 rounded-xl font-bold text-xs ${gridCount === num ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-400'}`}>{num}</button>
                                            ))}
                                        </div>
                                        <button onClick={() => setImage(null)} className="text-red-400 p-2 hover:bg-red-50 rounded-xl"><i data-lucide="trash-2"></i></button>
                                    </div>
                                    
                                    <div className="bg-slate-200 canvas-container flex items-center justify-center p-12 min-h-[600px] border-[12px] border-white relative">
                                        <canvas ref={canvasRef} className="max-w-full shadow-2xl bg-white"></canvas>
                                    </div>
                                </div>
                            </>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-white border-t p-8 text-center">
                        <p className="text-[10px] font-black uppercase tracking-[0.4em] text-slate-300">© 2026 AiPassportStudio - Your Professional Studio Partner</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Icons
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
